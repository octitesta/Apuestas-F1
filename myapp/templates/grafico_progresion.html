<!-- Gráfico de Progresión -->
<div class="card shadow-lg border-0 mt-5">
    <div class="card-header text-white py-3"
        style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);">
        <div class="d-flex align-items-center">
            <span class="fs-4 me-2">📈</span>
            <div>
                <h5 class="mb-0 fw-bold">Gráfico de Progresión</h5>
                <small class="opacity-75">Evolución acumulada de puntos por usuario</small>
            </div>
        </div>
    </div>

    <div class="card-body p-4">
        {% if datos_json %}
        <div style="position: relative; height: 400px;">
            <canvas id="progressionChart"></canvas>
        </div>
        {% else %}
        <div class="text-center text-muted py-5">
            <p>No hay datos de progresión disponibles aún. Completa algunas carreras para ver el gráfico.</p>
        </div>
        {% endif %}
    </div>
</div>

{% if datos_json %}
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script>
    // Parsear datos JSON desde Django
    const data = {{ datos_json|safe }};
    
    // Generar colores para cada serie
    const colors = [
        'rgba(255, 99, 132, 1)',
        'rgba(54, 162, 235, 1)',
        'rgba(75, 192, 75, 1)',
        'rgba(255, 206, 86, 1)',
        'rgba(153, 102, 255, 1)',
        'rgba(255, 159, 64, 1)',
        'rgba(199, 199, 199, 1)',
        'rgba(83, 102, 255, 1)',
        'rgba(255, 99, 255, 1)',
        'rgba(99, 255, 132, 1)',
    ];
    
    const bgColors = [
        'rgba(255, 99, 132, 0.1)',
        'rgba(54, 162, 235, 0.1)',
        'rgba(75, 192, 75, 0.1)',
        'rgba(255, 206, 86, 0.1)',
        'rgba(153, 102, 255, 0.1)',
        'rgba(255, 159, 64, 0.1)',
        'rgba(199, 199, 199, 0.1)',
        'rgba(83, 102, 255, 0.1)',
        'rgba(255, 99, 255, 0.1)',
        'rgba(99, 255, 132, 0.1)',
    ];
    
    // Construir datasets para el gráfico
    const datasets = data.series.map((serie, index) => ({
        label: serie.usuario,
        data: serie.puntos,
        borderColor: colors[index % colors.length],
        backgroundColor: bgColors[index % bgColors.length],
        borderWidth: 3,
        tension: 0.3,
        fill: false,
        pointRadius: 5,
        pointBackgroundColor: colors[index % colors.length],
        pointBorderColor: '#fff',
        pointBorderWidth: 2,
        pointHoverRadius: 7,
        segment: {
            borderDash: [0]
        }
    }));
    
    const ctx = document.getElementById('progressionChart').getContext('2d');
    
    new Chart(ctx, {
        type: 'line',
        data: {
            labels: data.etiquetas,
            datasets: datasets
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            interaction: {
                mode: 'index',
                intersect: false,
            },
            plugins: {
                legend: {
                    position: 'top',
                    labels: {
                        usePointStyle: true,
                        padding: 20,
                        font: {
                            size: 12,
                            weight: 'bold'
                        }
                    }
                },
                tooltip: {
                    backgroundColor: 'rgba(0, 0, 0, 0.8)',
                    padding: 12,
                    titleFont: {
                        size: 14
                    },
                    bodyFont: {
                        size: 13
                    },
                    borderColor: 'rgba(255, 255, 255, 0.3)',
                    borderWidth: 1,
                    displayColors: true,
                    callbacks: {
                        label: function(context) {
                            return context.dataset.label + ': ' + context.parsed.y.toFixed(1) + ' pts';
                        }
                    }
                }
            },
            scales: {
                y: {
                    beginAtZero: true,
                    grid: {
                        color: 'rgba(0, 0, 0, 0.05)',
                        drawBorder: false
                    },
                    ticks: {
                        font: {
                            size: 11
                        },
                        callback: function(value) {
                            return value.toFixed(0);
                        }
                    },
                    title: {
                        display: false
                    }
                },
                x: {
                    grid: {
                        display: false,
                        drawBorder: false
                    },
                    ticks: {
                        font: {
                            size: 11
                        }
                    }
                }
            }
        }
    });
</script>
{% endif %}
