{% extends "base.html" %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow-lg border-0">
                <div class="card-header bg-primary text-white py-4">
                    <h4 class="mb-0">🏁 Crear Nueva Sala</h4>
                </div>
                <div class="card-body p-4">
                    {% if messages %}
                        {% for message in messages %}
                        <div class="alert alert-{{ message.tags }} alert-dismissible fade show" role="alert">
                            {{ message }}
                            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                        </div>
                        {% endfor %}
                    {% endif %}

                    <form method="POST">
                        {% csrf_token %}
                        
                        <div class="mb-3">
                            <label for="name" class="form-label fw-bold">Nombre de la Sala</label>
                            <input 
                                type="text" 
                                class="form-control form-control-lg" 
                                id="name" 
                                name="name" 
                                placeholder="Ej: Carrera con Amigos"
                                required
                                maxlength="100">
                            <small class="text-muted">Elige un nombre para tu sala de competencia</small>
                        </div>

                        <button type="submit" class="btn btn-primary btn-lg w-100">
                            ✅ Crear Sala
                        </button>
                    </form>

                    <div class="mt-4 pt-3 border-top">
                        <p class="text-muted text-center mb-0">
                            ¿Ya tienes una sala? 
                            <a href="{% url 'unirse_sala' %}" class="text-decoration-none">Únete aquí</a>
                        </p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
