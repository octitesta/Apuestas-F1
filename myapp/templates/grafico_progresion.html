<!-- Progression Chart -->
<div class="card shadow-lg border-0 mt-5">
    <div class="card-header text-white py-3"
        style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);">
        <div class="d-flex align-items-center">
            <span class="fs-4 me-2">📈</span>
            <div>
                <h5 class="mb-0 fw-bold" style="color: #fff;">Gráfico de Progresión</h5>
                <small style="color: rgba(255,255,255,0.75);">Evolución acumulada de puntos por usuario</small>
            </div>
        </div>
    </div>

    <div class="card-body p-4">
        {% if datos_json %}
        <div style="position: relative; height: 400px;">
            <canvas id="progressionChart"></canvas>
        </div>
        {% else %}
        <div class="text-center py-5">
            <p>No hay datos de progresión disponibles aún. Completa algunas carreras para ver el gráfico.</p>
        </div>
        {% endif %}
    </div>
</div>

{% if datos_json %}
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script>
    // Parse JSON data from Django
    const data = {{ datos_json|safe }};
    
    // Colors for each series
    const colors = [
        'rgba(56, 189, 248, 1)',
        'rgba(124, 58, 237, 1)',
        'rgba(16, 185, 129, 1)',
        'rgba(245, 158, 11, 1)',
        'rgba(236, 72, 153, 1)',
        'rgba(6, 182, 212, 1)',
        'rgba(148, 163, 184, 1)',
        'rgba(99, 102, 241, 1)',
        'rgba(244, 114, 182, 1)',
        'rgba(34, 197, 94, 1)',
    ];
    
    const bgColors = [
        'rgba(56, 189, 248, 0.1)',
        'rgba(124, 58, 237, 0.1)',
        'rgba(16, 185, 129, 0.1)',
        'rgba(245, 158, 11, 0.1)',
        'rgba(236, 72, 153, 0.1)',
        'rgba(6, 182, 212, 0.1)',
        'rgba(148, 163, 184, 0.1)',
        'rgba(99, 102, 241, 0.1)',
        'rgba(244, 114, 182, 0.1)',
        'rgba(34, 197, 94, 0.1)',
    ];
    
    // Build datasets
    const datasets = data.series.map((serie, index) => ({
        label: serie.usuario,
        data: serie.puntos,
        borderColor: colors[index % colors.length],
        backgroundColor: bgColors[index % bgColors.length],
        borderWidth: 3,
        tension: 0.3,
        fill: false,
        pointRadius: 5,
        pointBackgroundColor: colors[index % colors.length],
        pointBorderColor: 'rgba(15, 23, 42, 1)',
        pointBorderWidth: 2,
        pointHoverRadius: 7,
        segment: {
            borderDash: [0]
        }
    }));
    
    const ctx = document.getElementById('progressionChart').getContext('2d');
    
    new Chart(ctx, {
        type: 'line',
        data: {
            labels: data.etiquetas,
            datasets: datasets
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            interaction: {
                mode: 'index',
                intersect: false,
            },
            plugins: {
                legend: {
                    position: 'top',
                    labels: {
                        usePointStyle: true,
                        padding: 20,
                        color: '#475569',
                        font: {
                            size: 12,
                            weight: 'bold',
                            family: "'Inter', sans-serif"
                        }
                    }
                },
                tooltip: {
                    backgroundColor: 'rgba(255, 255, 255, 0.95)',
                    padding: 12,
                    titleColor: '#1e293b',
                    bodyColor: '#475569',
                    titleFont: {
                        size: 14,
                        family: "'Inter', sans-serif"
                    },
                    bodyFont: {
                        size: 13,
                        family: "'Inter', sans-serif"
                    },
                    borderColor: 'rgba(0, 0, 0, 0.1)',
                    borderWidth: 1,
                    displayColors: true,
                    callbacks: {
                        label: function(context) {
                            return context.dataset.label + ': ' + context.parsed.y.toFixed(1) + ' pts';
                        }
                    }
                }
            },
            scales: {
                y: {
                    beginAtZero: true,
                    grid: {
                        color: 'rgba(0, 0, 0, 0.06)',
                        drawBorder: false
                    },
                    ticks: {
                        color: '#64748b',
                        font: {
                            size: 11,
                            family: "'Inter', sans-serif"
                        },
                        callback: function(value) {
                            return value.toFixed(0);
                        }
                    },
                    title: {
                        display: false
                    }
                },
                x: {
                    grid: {
                        display: false,
                        drawBorder: false
                    },
                    ticks: {
                        color: '#64748b',
                        font: {
                            size: 11,
                            family: "'Inter', sans-serif"
                        }
                    }
                }
            }
        }
    });
</script>
{% endif %}
